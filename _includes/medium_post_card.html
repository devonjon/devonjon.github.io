<div class="card post">
	<a href="{{ include.href }}">
		<img class="img-fluid" src="{{ include.image }}" alt="">
	</a>
	<div class="card-block">
		<h2 class="card-title"><a href="{{ include.href }}">{{ include.title }}</a></h2>
		<h4 class="card-text">{{ include.lede }}</h4>
		<div class="metafooter">
			<div class="wrapfooter">
				<span class="meta-footer-thumb">
					<a href="/author"><img class="author-thumb" src="{{include.author.image}}"></a>
				</span>
				<span class="author-meta">
					<span class="post-name"><a href="{{ include.author.name }}.html">{{ include.author.name }}</a></span><br/>
					<span class="post-date">{{ include.date }}<span class="dot"></span></span>{{ include.words }}<span class="dot"></span><span class="post-read">{{ include.time }}</span>
				</span>
				<span class="post-read-more"><a href="{{ include.href }}" title="Read Article"><svg class="svgIcon-use" width="25" height="25" viewbox="0 0 25 25"><path d="M19 6c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v14.66h.012c.01.103.045.204.12.285a.5.5 0 0 0 .706.03L12.5 16.85l5.662 4.126a.508.508 0 0 0 .708-.03.5.5 0 0 0 .118-.285H19V6zm-6.838 9.97L7 19.636V6c0-.55.45-1 1-1h9c.55 0 1 .45 1 1v13.637l-5.162-3.668a.49.49 0 0 0-.676 0z" fill-rule="evenodd"></path></svg></a></span>
			</div>
		</div>
	</div>
</div>
